name: StatMind CI/CD — AWS EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Code quality checks ────────────────────────────────────────────────
  lint:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no personal paths in codebase
        run: |
          if grep -rn "C:\\\\Users\\\\ASUS" . \
            --include="*.py" --include="*.html" --include="*.md" \
            --include="*.yml" --include="*.yaml" 2>/dev/null | grep -v ".git"; then
            echo "ERROR: Personal Windows path found in codebase"
            exit 1
          fi
          echo "✓ No personal paths"

      - name: Check no dead sprint files
        run: |
          if ls main_sprint*.py main_gapfill*.py 2>/dev/null; then
            echo "ERROR: Sprint artifacts still in repo — delete them"
            exit 1
          fi
          echo "✓ No dead sprint files"

      - name: Check no binary blobs in repo
        run: |
          if ls *.zip *.tar *.tar.gz 2>/dev/null; then
            echo "ERROR: Binary blobs found — add to .gitignore and remove"
            exit 1
          fi
          echo "✓ No binary blobs"

  # ── 2. Python statistical engine tests ───────────────────────────────────
  tests:
    name: Statistical engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Syntax check — all engine files
        run: |
          for f in capability.py normality.py gauge_rr.py control_charts.py \
                   email_capture.py main.py; do
            if [ -f "$f" ]; then
              python -m py_compile "$f" && echo "✓ $f" || exit 1
            fi
          done

      - name: Run statistical engine tests
        run: |
          cd tests
          python -m pytest test_statistical_engines.py -v --tb=short 2>&1 | tail -30

  # ── 3. API route coverage check ──────────────────────────────────────────
  api_routes:
    name: API coverage
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Check required endpoints exist
        run: |
          REQUIRED=(
            "/api/v1/capability/analyze"
            "/api/v1/spc/analyze"
            "/api/v1/normality/analyze"
            "/api/v1/grr/analyze"
            "/api/v1/capa/v2/generate"
            "/api/v1/intelligence/analyse"
            "/api/v1/pca/analyze"
            "/api/v1/regression/logistic"
            "/api/v1/attribute-charts/p"
            "/api/v1/email/capture"
            "/api/v1/health"
          )
          for route in "${REQUIRED[@]}"; do
            if ! grep -q "\"$route\"" main.py; then
              echo "✗ MISSING endpoint: $route"
              exit 1
            fi
            echo "✓ $route"
          done

  # ── 4. Docker build + smoke test ─────────────────────────────────────────
  docker_build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t statmind:ci-${{ github.sha }} .
          echo "✓ Docker image built"

      - name: Smoke test — health endpoint
        run: |
          docker run -d --name statmind-test \
            -p 8000:8000 \
            -e ENV=ci \
            statmind:ci-${{ github.sha }}

          echo "Waiting for gunicorn to start (max 60s)..."
          for i in $(seq 1 12); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8000/api/v1/health 2>/dev/null || echo "000")
            echo "  Attempt $i/12 — HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✓ Health check passed"
              docker stop statmind-test
              exit 0
            fi
            sleep 5
          done

          echo "✗ Health check failed after 60s"
          docker logs statmind-test --tail 40
          docker stop statmind-test 2>/dev/null || true
          exit 1

  # ── 5. Deploy to EC2 — main branch pushes only ───────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [docker_build, api_routes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            echo "=== StatMind deploy started — $(date) ==="

            # Fix ownership so git pull never fails
            sudo chown -R ec2-user:ec2-user /opt/statmind

            cd /opt/statmind
            git pull origin main

            # Rebuild with new code — bake the just-pulled SHA so the
            # health endpoint can prove the NEW code is serving (Session 6)
            EXPECTED_SHA=$(git rev-parse HEAD)
            docker build --build-arg GIT_SHA=$EXPECTED_SHA -t statmind:latest .

            # Graceful container replacement
            docker stop statmind 2>/dev/null || true
            docker rm   statmind 2>/dev/null || true

            sudo systemctl restart statmind

            # Wait up to 120s for the NEW release to answer. HTTP 200 alone is
            # not enough — during PR #65 the OLD container answered 200 mid-swap.
            echo "Waiting for release $EXPECTED_SHA to be healthy..."
            for i in $(seq 1 24); do
              BODY=$(curl -s http://localhost:8000/api/v1/health 2>/dev/null || echo "")
              echo "  Attempt $i/24"
              if echo "$BODY" | grep -q '"status":"ok"' && echo "$BODY" | grep -q "$EXPECTED_SHA"; then
                echo "✓ StatMind healthy AND serving release $EXPECTED_SHA — deploy complete"
                exit 0
              fi
              sleep 5
            done

            echo "✗ Deploy failed — app not healthy after 120s"
            docker logs statmind --tail 50 2>/dev/null || true
            exit 1

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            EXPECTED_SHA=$(cd /opt/statmind && git rev-parse HEAD)
            BODY=$(curl -s http://localhost:8000/api/v1/health)
            if echo "$BODY" | grep -q '"status":"ok"' && echo "$BODY" | grep -q "$EXPECTED_SHA"; then
              echo "✓ Deployment verified — release $EXPECTED_SHA live at https://www.statmind.tech"
            else
              echo "✗ Verification failed — health did not report release $EXPECTED_SHA"
              echo "  body: $BODY"
              docker logs statmind --tail 30 2>/dev/null || true
              exit 1
            fi
