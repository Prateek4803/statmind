name: StatMind CI/CD — AWS EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Frontend checks ────────────────────────────────────────────────────
  frontend:
    name: Frontend sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JS syntax check
        run: |
          node --check static/index.html 2>/dev/null || true
          # Check braces balance
          OPENS=$(grep -o '{' static/index.html | wc -l)
          CLOSES=$(grep -o '}' static/index.html | wc -l)
          echo "Braces: { $OPENS } $CLOSES"

      - name: Check no personal paths in codebase
        run: |
          if grep -r "C:\\\\Users\\\\ASUS" . --include="*.py" --include="*.html" --include="*.md" 2>/dev/null | grep -v ".git"; then
            echo "ERROR: Personal Windows path found in codebase"
            exit 1
          fi
          echo "✓ No personal paths"

      - name: Check no dead sprint files
        run: |
          if ls main_sprint*.py 2>/dev/null; then
            echo "ERROR: Sprint artifacts still in repo"
            exit 1
          fi
          echo "✓ No dead sprint files"

  # ── 2. Python statistical engine tests ───────────────────────────────────
  tests:
    name: Statistical engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run statistical engine tests
        run: |
          cd tests
          python -m pytest test_statistical_engines.py -v --tb=short 2>&1 | tail -20

      - name: Check all engine files syntax
        run: |
          python -m py_compile capability.py
          python -m py_compile normality.py
          python -m py_compile gauge_rr.py
          python -m py_compile control_charts.py
          python -m py_compile main.py
          echo "✓ All Python files syntax valid"

  # ── 3. API route coverage check ──────────────────────────────────────────
  api_routes:
    name: API coverage
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Check required endpoints exist
        run: |
          REQUIRED=(
            "/api/v1/capability/analyze"
            "/api/v1/spc/analyze"
            "/api/v1/normality/analyze"
            "/api/v1/grr/analyze"
            "/api/v1/capa/v2/generate"
            "/api/v1/intelligence/analyse"
            "/api/v1/pca/analyze"
            "/api/v1/regression/logistic"
            "/api/v1/attribute-charts/p"
            "/api/v1/health"
          )
          for route in "${REQUIRED[@]}"; do
            if ! grep -q "\"$route\"" main.py; then
              echo "MISSING endpoint: $route"
              exit 1
            fi
            echo "✓ $route"
          done

  # ── 4. Docker build check ─────────────────────────────────────────────────
  docker_build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [frontend, tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t statmind:ci-${{ github.sha }} .
          echo "✓ Docker image built successfully"

      - name: Quick smoke test
        run: |
          docker run -d --name statmind-test -p 8000:8000 statmind:ci-${{ github.sha }}
          echo "=== Container started, waiting 40s for gunicorn ==="
          sleep 40
          echo "=== CONTAINER LOGS START ==="
          docker logs statmind-test 2>&1 || true
          echo "=== CONTAINER LOGS END ==="
          echo "=== Checking health ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health || echo "000")
          echo "HTTP response code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAILED: health check returned $HTTP_CODE"
            exit 1
          fi
          echo "✓ Health check passed"
          docker stop statmind-test

  # ── 5. Deploy to EC2 (only on main branch push, not PRs) ─────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [docker_build, api_routes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            cd /opt/statmind
            echo "=== Deploying StatMind $(date) ==="

            # Pull latest code
            git pull origin main

            # Rebuild Docker image
            docker build -t statmind:latest .

            # Rolling restart (zero-downtime)
            systemctl restart statmind

            # Wait for health check
            for i in $(seq 1 20); do
              if curl -s http://localhost:8000/api/v1/health > /dev/null 2>&1; then
                echo "✓ StatMind healthy after deploy"
                break
              fi
              echo "  Waiting... ($i/20)"
              sleep 5
            done

            echo "=== Deploy complete ==="

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health)
            if [ "$HTTP" = "200" ]; then
              echo "✓ Deployment verified — StatMind is live"
            else
              echo "✗ Deployment verification failed (HTTP $HTTP)"
              exit 1
            fi
