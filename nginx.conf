# ── StatMind nginx configuration ──────────────────────────────────────────────
# nginx sits in front of gunicorn/uvicorn:
#   browser → nginx:80 → gunicorn:8000
# Benefits: serves static files directly (faster), handles SSL termination,
#           buffers slow client connections (protecting the Python event loop)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-font-ttf image/svg+xml;
    gzip_min_length 1024;

    # Security headers (belt + suspenders with app-level headers)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    # File upload limit — 100MB max (large CSV/Excel files)
    client_max_body_size 100M;
    client_body_timeout 60s;

    server {
        listen 80;
        server_name _;     # catches any hostname (public IP or domain)

        # ── Static files — served directly by nginx (bypasses Python entirely) ──
        location /static/ {
            alias /app/static/;
            expires 1d;
            add_header Cache-Control "public, immutable";
            gzip_static on;
        }

        # ── API endpoints — proxy to gunicorn ──────────────────────────────────
        location /api/ {
            # Rate limit API endpoints
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for heavy analyses (GRR, DOE, RSM can take 30-60s)
            proxy_read_timeout 180s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;

            # Don't buffer — send analysis results as they complete
            proxy_buffering off;
        }

        # ── File upload endpoints — lower rate limit ───────────────────────────
        location ~ ^/api/v1/(columns|capability|spc|normality|grr|transformation) {
            limit_req zone=upload burst=5 nodelay;

            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 180s;
            client_max_body_size 100M;
        }

        # ── Health check — no rate limiting ───────────────────────────────────
        location /api/v1/health {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Everything else — proxy to FastAPI (serves index.html) ─────────────
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Error pages ────────────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
